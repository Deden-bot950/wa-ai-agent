<!DOCTYPE html>
<html lang="su">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Cep Deden AI</title>
<style>
  :root{
    --bg:#12181f;
    --bg2:#1b232c;
    --bg3:#232d38;
    --line:#2c3743;
    --text:#edeae3;
    --text-dim:#9aa5b1;
    --gold:#d9a441;
    --gold-dim:#a97f34;
    --teal:#3a8f8f;
    --danger:#d9634a;
    --radius:16px;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    margin:0; background:var(--bg); color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    display:flex; flex-direction:column; overflow:hidden;
  }
  #topbar{
    display:flex; align-items:center; gap:8px;
    padding:12px 14px; background:var(--bg2); border-bottom:1px solid var(--line);
    flex-shrink:0; z-index:20;
  }
  #menuBtn{background:none;border:none;color:var(--text);font-size:22px;cursor:pointer;padding:4px 8px;}
  #brand{display:flex; align-items:center; gap:8px; flex:1; min-width:0;}
  #brand .logo{
    width:38px;height:38px;border-radius:50%;flex-shrink:0;
    overflow:hidden;
    box-shadow:0 0 0 2px var(--gold-dim);
  }
  #brand .logo img{width:100%;height:100%;object-fit:cover;object-position:center 30%;}
  #brand .title{font-weight:700; font-size:16px; letter-spacing:.2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  #brand .sub{font-size:11px; color:var(--text-dim);}
  #modelSelect{
    background:var(--bg3); color:var(--text); border:1px solid var(--line);
    border-radius:20px; padding:7px 10px; font-size:12px; max-width:120px;
  }
  #overlay{position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:29; display:none;}
  #sidebar{
    position:fixed; top:0; left:0; bottom:0; width:78%; max-width:300px;
    background:var(--bg2); border-right:1px solid var(--line); z-index:30;
    transform:translateX(-100%); transition:transform .25s ease; display:flex; flex-direction:column;
  }
  #sidebar.open{transform:translateX(0);}
  #overlay.show{display:block;}
  #sidebarHead{padding:16px; border-bottom:1px solid var(--line);}
  #newChatBtn{
    width:100%; padding:11px; border-radius:12px; border:1px solid var(--gold-dim);
    background:rgba(217,164,65,.1); color:var(--gold); font-weight:600; font-size:14px; cursor:pointer;
  }
  #convList{flex:1; overflow-y:auto; padding:8px;}
  .convItem{
    padding:11px 12px; border-radius:10px; margin-bottom:4px; cursor:pointer;
    font-size:13px; color:var(--text-dim); display:flex; justify-content:space-between; align-items:center; gap:6px;
  }
  .convItem:hover, .convItem.active{background:var(--bg3); color:var(--text);}
  .convItem .del{color:var(--text-dim); font-size:15px; padding:2px 6px;}
  #sidebarFoot{padding:12px 16px; border-top:1px solid var(--line); font-size:11px; color:var(--text-dim);}
  #chatWrap{flex:1; overflow-y:auto; padding:16px 12px 8px;}
  #emptyState{
    height:100%; display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; padding:20px; color:var(--text-dim);
  }
  #emptyState .big{font-size:20px; color:var(--text); font-weight:700; margin-bottom:6px;}
  #emptyState .small{font-size:13px; max-width:280px; line-height:1.5;}
  .msg{max-width:88%; margin-bottom:14px; display:flex; flex-direction:column;}
  .msg.user{align-self:flex-end; margin-left:auto; align-items:flex-end;}
  .msg.ai{align-self:flex-start; align-items:flex-start;}
  .bubble{
    padding:11px 14px; border-radius:var(--radius); font-size:14.5px; line-height:1.5; white-space:pre-wrap; word-break:break-word;
  }
  .msg.user .bubble{background:var(--gold); color:#20160a; border-bottom-right-radius:4px;}
  .msg.ai .bubble{background:var(--bg3); color:var(--text); border-bottom-left-radius:4px;}
  .msg .meta{font-size:10.5px; color:var(--text-dim); margin-top:4px; padding:0 4px; display:flex; gap:8px; align-items:center;}
  .msg img.attach, .msg video.attach{max-width:220px; border-radius:12px; margin-bottom:6px; display:block;}
  .speakBtn{background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:13px;}
  .typing{display:flex; gap:4px; padding:12px 14px;}
  .typing span{width:6px;height:6px;border-radius:50%;background:var(--text-dim);animation:blink 1.2s infinite;}
  .typing span:nth-child(2){animation-delay:.2s;} .typing span:nth-child(3){animation-delay:.4s;}
  @keyframes blink{0%,80%,100%{opacity:.3;} 40%{opacity:1;}}
  #composer{
    background:var(--bg2); border-top:1px solid var(--line); padding:8px 10px 12px; flex-shrink:0;
  }
  #modeRow{display:flex; gap:6px; padding:0 2px 8px; overflow-x:auto;}
  .modeBtn{
    flex-shrink:0; padding:6px 12px; border-radius:16px; border:1px solid var(--line);
    background:var(--bg3); color:var(--text-dim); font-size:12px; cursor:pointer; display:flex; align-items:center; gap:5px;
  }
  .modeBtn.active{background:rgba(217,164,65,.15); border-color:var(--gold-dim); color:var(--gold);}
  #attachPreview{display:none; padding:0 4px 8px;}
  #attachPreview img{max-height:70px; border-radius:10px;}
  #attachPreview .rm{background:var(--danger); color:#fff; border:none; border-radius:50%; width:20px; height:20px; margin-left:6px; cursor:pointer;}
  #inputRow{display:flex; align-items:flex-end; gap:6px; background:var(--bg3); border-radius:22px; padding:6px 6px 6px 14px; border:1px solid var(--line);}
  #textInput{
    flex:1; background:none; border:none; color:var(--text); font-size:15px; resize:none;
    max-height:110px; padding:8px 0; outline:none; font-family:inherit;
  }
  #textInput::placeholder{color:var(--text-dim);}
  .iconBtn{
    background:none; border:none; color:var(--text-dim); font-size:19px; cursor:pointer;
    width:38px; height:38px; display:flex; align-items:center; justify-content:center; border-radius:50%; flex-shrink:0;
  }
  .iconBtn.mic.listening{color:var(--danger); animation:pulse 1s infinite;}
  @keyframes pulse{0%,100%{opacity:1;} 50%{opacity:.4;}}
  #sendBtn{
    background:var(--gold); color:#20160a; border:none; width:38px; height:38px; border-radius:50%;
    font-size:16px; cursor:pointer; flex-shrink:0; display:flex; align-items:center; justify-content:center;
  }
  #sendBtn:disabled{opacity:.4;}
  #fileInput{display:none;}
  #syncBadge{font-size:10px; color:var(--text-dim); text-align:center; padding-top:6px;}
</style>
</head>

<script>
let conversations = JSON.parse(localStorage.getItem('cepdeden_convs') || '[]');
let currentConvId = null;
let currentMode = 'chat';
let attachedImage = null;
let jsonbinConfig = JSON.parse(localStorage.getItem('cepdeden_jsonbin') || 'null');

const chatWrap = document.getElementById('chatWrap');
const textInput = document.getElementById('textInput');
const sendBtn = document.getElementById('sendBtn');
const modelSelect = document.getElementById('modelSelect');
const brainLabel = document.getElementById('brainLabel');

async function ensureJsonbin(){
  if (jsonbinConfig && jsonbinConfig.apiKey && jsonbinConfig.binId) return;
  const key = prompt("Asupkeun JSONBin API Key (X-Master-Key) supaya riwayat ngobrol sinkron di sadaya HP:\n(Kosongkeun lamun teu perlu, ngobrolna ngan kacatet di HP ieu wungkul)");
  if (!key) { jsonbinConfig = null; return; }
  try {
    const res = await fetch('https://api.jsonbin.io/v3/b', {
      method:'POST',
      headers:{'Content-Type':'application/json','X-Master-Key':key,'X-Bin-Name':'cep-deden-ai-history'},
      body: JSON.stringify({conversations: []})
    });
    const data = await res.json();
    jsonbinConfig = { apiKey:key, binId:data.metadata.id };
    localStorage.setItem('cepdeden_jsonbin', JSON.stringify(jsonbinConfig));
    document.getElementById('syncStatus').textContent = 'Geus nyambung ✓';
  } catch(e){
    alert('Gagal nyetel JSONBin: ' + e.message);
    jsonbinConfig = null;
  }
}

async function syncToJsonbin(){
  if (!jsonbinConfig) return;
  document.getElementById('syncBadge').textContent = 'Nyimpen...';
  try {
    await fetch(`https://api.jsonbin.io/v3/b/${jsonbinConfig.binId}`, {
      method:'PUT',
      headers:{'Content-Type':'application/json','X-Master-Key':jsonbinConfig.apiKey},
      body: JSON.stringify({conversations})
    });
    document.getElementById('syncBadge').textContent = 'Kacatet ✓';
  } catch(e){
    document.getElementById('syncBadge').textContent = 'Gagal sinkron';
  }
  setTimeout(()=>document.getElementById('syncBadge').textContent='',2000);
}

async function pullFromJsonbin(){
  if (!jsonbinConfig) return;
  try {
    const res = await fetch(`https://api.jsonbin.io/v3/b/${jsonbinConfig.binId}/latest`, {
      headers:{'X-Master-Key':jsonbinConfig.apiKey}
    });
    const data = await res.json();
    if (data.record && data.record.conversations && data.record.conversations.length > (conversations.length||0)) {
      conversations = data.record.conversations;
      localStorage.setItem('cepdeden_convs', JSON.stringify(conversations));
      renderConvList();
    }
    document.getElementById('syncStatus').textContent = 'Geus nyambung ✓';
  } catch(e){ document.getElementById('syncStatus').textContent = 'Gagal nyambung'; }
}

function newConversation(){
  const conv = { id: Date.now().toString(), title: 'Obrolan anyar', messages: [], createdAt: Date.now() };
  conversations.unshift(conv);
  currentConvId = conv.id;
  saveConvs();
  renderConvList();
  renderMessages();
  closeSidebar();
}

function getCurrentConv(){
  return conversations.find(c => c.id === currentConvId);
}

function saveConvs(){
  localStorage.setItem('cepdeden_convs', JSON.stringify(conversations));
  syncToJsonbin();
}

function renderConvList(){
  const list = document.getElementById('convList');
  list.innerHTML = '';
  conversations.forEach(c => {
    const div = document.createElement('div');
    div.className = 'convItem' + (c.id === currentConvId ? ' active' : '');
    div.innerHTML = `<span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${escapeHtml(c.title)}</span><span class="del" data-id="${c.id}">🗑</span>`;
    div.addEventListener('click', (e) => {
      if (e.target.classList.contains('del')) {
        e.stopPropagation();
        conversations = conversations.filter(x => x.id !== c.id);
        if (currentConvId === c.id) currentConvId = conversations[0]?.id || null;
        saveConvs(); renderConvList(); renderMessages();
        return;
      }
      currentConvId = c.id;
      renderConvList(); renderMessages(); closeSidebar();
    });
    list.appendChild(div);
  });
}

function escapeHtml(s){
  return (s||'').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}

function renderMessages(){
  const conv = getCurrentConv();
  if (!conv || conv.messages.length === 0) {
    chatWrap.innerHTML = `<div id="emptyState"><div class="big">Wilujeng sumping, Lur 👋</div><div class="small">Naros naon waé — ngobrol, mariksa gambar, nyieun gambar, nyieun video, atawa ngobrol ku sora. Pilih heula mode di handap.</div></div>`;
    return;
  }
  chatWrap.innerHTML = '';
  conv.messages.forEach(m => chatWrap.appendChild(renderMsgEl(m)));
  chatWrap.scrollTop = chatWrap.scrollHeight;
}

function renderMsgEl(m){
  const wrap = document.createElement('div');
  wrap.className = 'msg ' + (m.role === 'user' ? 'user' : 'ai');
  let mediaHtml = '';
  if (m.image) mediaHtml += `<img class="attach" src="${m.image}">`;
  if (m.video) mediaHtml += `<video class="attach" src="${m.video}" controls></video>`;
  wrap.innerHTML = `<div class="bubble">${mediaHtml}${escapeHtml(m.content)}</div>
    <div class="meta">${m.role==='ai' ? '<button class="speakBtn">🔊</button>' : ''}<span>${m.brain || ''}</span></div>`;
  if (m.role === 'ai') {
    wrap.querySelector('.speakBtn').addEventListener('click', () => speak(m.content));
  }
  return wrap;
}

function addTypingIndicator(){
  const el = document.createElement('div');
  el.className = 'msg ai'; el.id = 'typingIndicator';
  el.innerHTML = `<div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>`;
  chatWrap.appendChild(el);
  chatWrap.scrollTop = chatWrap.scrollHeight;
}
function removeTypingIndicator(){
  document.getElementById('typingIndicator')?.remove();
}

document.querySelectorAll('.modeBtn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.modeBtn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentMode = btn.dataset.mode;
    const placeholders = { chat:'Tulis talatah...', image:'Caritakeun gambar naon nu rék dijieun...', video:'Caritakeun video naon nu rék dijieun...' };
    textInput.placeholder = placeholders[currentMode];
  });
});

modelSelect.addEventListener('change', () => {
  const label = modelSelect.options[modelSelect.selectedIndex].text;
  brainLabel.textContent = label;
});

document.getElementById('attachBtn').addEventListener('click', () => document.getElementById('fileInput').click());
document.getElementById('fileInput').addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    attachedImage = reader.result;
    document.getElementById('attachImg').src = attachedImage;
    document.getElementById('attachPreview').style.display = 'block';
  };
  reader.readAsDataURL(file);
});
document.getElementById('rmAttach').addEventListener('click', () => {
  attachedImage = null;
  document.getElementById('attachPreview').style.display = 'none';
  document.getElementById('fileInput').value = '';
});

let recognition = null;
let listening = false;
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
if (SpeechRecognition) {
  recognition = new SpeechRecognition();
  recognition.lang = 'su-ID';
  recognition.interimResults = false;
  recognition.onresult = (e) => {
    textInput.value += (textInput.value ? ' ' : '') + e.results[0][0].transcript;
  };
  recognition.onend = () => { listening = false; document.getElementById('micBtn').classList.remove('listening'); };
}
document.getElementById('micBtn').addEventListener('click', () => {
  if (!recognition) { alert('Browser ieu teu ngarojong asupan sora.'); return; }
  if (listening) { recognition.stop(); return; }
  listening = true;
  document.getElementById('micBtn').classList.add('listening');
  recognition.start();
});

function speak(text){
  if (!('speechSynthesis' in window)) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'su-ID';
  window.speechSynthesis.speak(u);
}

document.getElementById('menuBtn').addEventListener('click', () => {
  document.getElementById('sidebar').classList.add('open');
  document.getElementById('overlay').classList.add('show');
});
function closeSidebar(){
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('show');
}
document.getElementById('overlay').addEventListener('click', closeSidebar);
document.getElementById('newChatBtn').addEventListener('click', newConversation);

textInput.addEventListener('input', () => {
  textInput.style.height = 'auto';
  textInput.style.height = Math.min(textInput.scrollHeight, 110) + 'px';
});
textInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); }
});
sendBtn.addEventListener('click', handleSend);

async function handleSend(){
  const text = textInput.value.trim();
  if (!text && !attachedImage) return;
  if (!currentConvId) newConversation();
  const conv = getCurrentConv();

  const userMsg = { role:'user', content:text };
  if (attachedImage) userMsg.image = attachedImage;
  conv.messages.push(userMsg);
  if (conv.messages.length === 1) conv.title = text.slice(0,40) || 'Obrolan gambar';

  const imgToSend = attachedImage;
  textInput.value = ''; textInput.style.height='auto';
  attachedImage = null;
  document.getElementById('attachPreview').style.display = 'none';

  renderMessages();
  saveConvs();
  renderConvList();
  addTypingIndicator();
  sendBtn.disabled = true;

  try {
    if (currentMode === 'chat') {
      await runChat(conv, text, imgToSend);
    } else if (currentMode === 'image') {
      await runImageGen(conv, text, imgToSend);
    } else if (currentMode === 'video') {
      await runVideoGen(conv, text, imgToSend);
    }
  } catch (err) {
    removeTypingIndicator();
    conv.messages.push({ role:'ai', content:'Punten, aya kasalahan: ' + err.message });
    renderMessages();
    saveConvs();
  }
  sendBtn.disabled = false;
}

async function runChat(conv, text, image){
  const [provider, model] = modelSelect.value.split(':');
  const history = conv.messages.filter(m => m.content).slice(-16).map(m => ({
    role: m.role === 'user' ? 'user' : 'assistant',
    content: m.content,
    images: m.image ? [m.image] : undefined
  }));

  const res = await fetch('/.netlify/functions/chat', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({
      provider, model,
      systemPrompt: "Anjeun nyaéta Cep Deden AI, asisten pribadi pikeun Kang Deden. Anjeun WAJIB ngajawab ngan ngagunakeun Basa Sunda wungkul (bisa lemes atawa loma nurutkeun kaayaan obrolan), sanajan patarosanana ditulis ku basa séjén — kudu tetep dijawab ku Basa Sunda. Sebut nu ngajak ngobrol ku sesebutan 'Lur'. Ulah pisan nyebutkeun ngaran parusahaan atawa modél AI naon waé (contona OpenAI, ChatGPT, Google, Gemini); cukup wawakil salaku Cep Deden AI wungkul.",
      messages: history
    })
  });
  const data = await res.json();
  removeTypingIndicator();
  if (!res.ok) throw new Error(data.error || 'Gagal meunang jawaban');

  conv.messages.push({ role:'ai', content: data.text, brain: modelSelect.options[modelSelect.selectedIndex].text });
  renderMessages();
  saveConvs();
}

async function runImageGen(conv, text, image){
  const res = await fetch('/.netlify/functions/generate-image', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ prompt:text, referenceImage:image })
  });
  const data = await res.json();
  removeTypingIndicator();
  if (!res.ok) throw new Error(data.error || 'Gagal nyieun gambar');

  conv.messages.push({ role:'ai', content:'Ieu gambarna, Lur 🎨', image:data.image, brain:'Tukang Gambar' });
  renderMessages();
  saveConvs();
}

async function runVideoGen(conv, text, image){
  const startRes = await fetch('/.netlify/functions/generate-video', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ prompt:text, referenceImage:image })
  });
  const startData = await startRes.json();
  if (!startRes.ok) { removeTypingIndicator(); throw new Error(startData.error || 'Gagal mimitian nyieun video'); }

  const opName = startData.operationName;
  let tries = 0;
  while (tries < 40) {
    await new Promise(r => setTimeout(r, 10000));
    const statusRes = await fetch('/.netlify/functions/video-status?op=' + encodeURIComponent(opName));
    const statusData = await statusRes.json();
    if (!statusRes.ok) { removeTypingIndicator(); throw new Error(statusData.error || 'Gagal mariksa status video'); }
    if (statusData.done) {
      removeTypingIndicator();
      conv.messages.push({ role:'ai', content:'Videona tos réngsé, Lur 🎬 (aya cap cai SynthID, standar ti sadaya video)', video:statusData.video, brain:'Tukang Video' });
      renderMessages();
      saveConvs();
      return;
    }
    tries++;
  }
  removeTypingIndicator();
  throw new Error('Videona lila teuing dijieunna, cobian pariksa deui engké.');
}

(async function init(){
  await ensureJsonbin();
  if (jsonbinConfig) await pullFromJsonbin();
  if (conversations.length === 0) newConversation();
  else { currentConvId = conversations[0].id; renderConvList(); renderMessages(); }
})();
</script>
